apis:
  - aid: novu:rest-api
    name: Novu REST API
    description: >-
      Server-side REST API exposing 135 operations across Events, Subscribers,
      Workflows, Topics, Integrations, Layouts, Messages, Notifications,
      Environments, Environment Variables, Domains, Channel Connections,
      Channel Endpoints, Translations, Activity, and Contexts. Authenticated
      with an ApiKey scheme delivered in the Authorization header. Honors
      IETF RateLimit-* headers, Idempotency-Key, and a published OpenAPI 3
      document available at /openapi.json on every region.
    humanURL: https://docs.novu.co/api-reference/overview
