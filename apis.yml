  - aid: novu:inbox-api
    name: Novu Inbox / In-App API
    description: >-
      Client-side API and React Inbox component for rendering an embedded
      in-app notification center, marking notifications as read / archived
      / snoozed, and managing per-user notification preferences directly
      in the browser. Ships with @novu/react, @novu/react-native, and
      @novu/js (vanilla) packages, plus pre-built Notion / Linear / Novu
      themes and full headless API access.
