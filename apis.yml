  - aid: novu:framework
    name: Novu Framework (Code-First Workflows)
    description: >-
      Code-first workflow framework that lets developers define notification
      workflows in TypeScript / JavaScript using `@novu/framework`, then
      sync them to Novu Cloud (or a self-hosted instance) via the
      `npx novu-sync` CLI or the `novuhq/actions-novu-sync` GitHub Action.
      Supports Express, Next.js, NestJS, Remix, SvelteKit, Nuxt, H3, AWS
      Lambda, and any node-runtime HTTP handler. The framework owns the
      workflow source-of-truth — the Dashboard editor stays in sync via
      a deterministic bridge URL.
    humanURL: https://docs.novu.co/framework/overview
    baseURL: https://docs.novu.co/framework
