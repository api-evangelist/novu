aid: novu
name: Novu
description: >-
  Novu is the open-source notification infrastructure for developers. A single
  REST API and workflow engine route a triggered event across in-app inbox,
  email, SMS, push, chat (Slack / Discord / MS Teams / WhatsApp) and custom
  channels — with subscriber preferences, topics, digest, snooze, and full
  workflow orchestration on top. Ships with the embeddable React Inbox
  component, the Novu Framework for code-first workflow authoring,
  language SDKs for nine ecosystems, a Postman collection, an MCP server,
  GitHub Action sync, the Maily block-based email editor, framework
  starters for Next.js / Remix / Nuxt / SvelteKit, and webhook bridges
  for Stripe / Clerk / Segment.
