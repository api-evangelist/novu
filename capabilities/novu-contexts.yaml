      path: /v2/contexts
      operations:
      - name: ContextsController_createContext
        method: POST
        description: Novu Create a Context
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
