        description: Novu List All Contexts
        inputParameters:
        - name: after
          in: query
          type: string
          required: false
          description: Cursor for pagination indicating the starting point after which to fetch results.
        - name: before
          in: query
          type: string
          required: false
          description: Cursor for pagination indicating the ending point before which to fetch results.
        - name: limit
          in: query
          type: number
          required: false
          description: Limit the number of items to return
        - name: orderDirection
          in: query
          type: string
          required: false
          description: Direction of sorting
        - name: orderBy
          in: query
          type: string
          required: false
          description: Field to order by
        - name: includeCursor
          in: query
          type: boolean
          required: false
          description: Include cursor item in response
        - name: id
          in: query
          type: string
          required: false
          description: Filter contexts by id
        - name: search
          in: query
          type: string
          required: false
          description: Search contexts by type or id (supports partial matching across both fields)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-contexts-type-id
      path: /v2/contexts/{type}/{id}
      operations:
      - name: ContextsController_updateContext
        method: PATCH
        description: Novu Update a Context
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Context ID
        - name: type
          in: path
          type: string
          required: true
          description: Context type
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload
