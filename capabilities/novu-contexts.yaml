        method: DELETE
        description: Novu Delete a Context
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Context ID
        - name: type
          in: path
          type: string
          required: true
          description: Context type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
