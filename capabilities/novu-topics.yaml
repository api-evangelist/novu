naftiko: 1.0.0-alpha2
info:
  label: Novu API — Topics
  description: 'Notifications — Topics. 11 operations. Lead operation: Check Topic Subscriber. Self-contained Naftiko capability covering one Novu business surface.'
  tags:
  - Novu
  - Notifications
  - Topics
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    NOVU_API_KEY: NOVU_API_KEY
capability:
  consumes:
  - type: http
    namespace: novu-topics
    baseUri: https://api.novu.co
    description: Novu REST API — Topics business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.NOVU_API_KEY}}'
      placement: header
    resources:
    - name: v1-topics-topickey-subscribers-externalsubscriberid
      path: /v1/topics/{topicKey}/subscribers/{externalSubscriberId}
      operations:
      - name: TopicsV1Controller_getTopicSubscriber
        method: GET
        description: Novu Check Topic Subscriber
        inputParameters:
        - name: externalSubscriberId
          in: path
          type: string
          required: true
          description: The external subscriber id
        - name: topicKey
          in: path
          type: string
          required: true
          description: The topic key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-topics
      path: /v2/topics
      operations:
      - name: TopicsController_listTopics
        method: GET
        description: Novu List All Topics
        inputParameters:
        - name: after
          in: query
          type: string
          required: false
          description: Cursor for pagination indicating the starting point after which to fetch results.
        - name: before
          in: query
          type: string
          required: false
          description: Cursor for pagination indicating the ending point before which to fetch results.
        - name: limit
          in: query
          type: number
          required: false
          description: Limit the number of items to return (max 100)
        - name: orderDirection
          in: query
          type: string
          required: false
          description: Direction of sorting
        - name: orderBy
          in: query
          type: string
          required: false
          description: Field to order by
        - name: includeCursor
          in: query
          type: boolean
          required: false
          description: Include cursor item in response
        - name: key
          in: query
          type: string
          required: false
          description: Key of the topic to filter results.
        - name: name
          in: query
          type: string
          required: false
          description: Name of the topic to filter results.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: TopicsController_upsertTopic
        method: POST
        description: Novu Create a Topic
        inputParameters:
        - name: failIfExists
          in: query
          type: boolean
          required: false
          description: If true, the request will fail if a topic with the same key already exists
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-topics-topickey
      path: /v2/topics/{topicKey}
      operations:
      - name: TopicsController_getTopic
        method: GET
        description: Novu Retrieve a Topic
        inputParameters:
        - name: topicKey
          in: path
          type: string
          required: true
          description: The key identifier of the topic
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: TopicsController_updateTopic
        method: PATCH
        description: Novu Update a Topic
        inputParameters:
        - name: topicKey
          in: path
          type: string
          required: true
          description: The key identifier of the topic
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: TopicsController_deleteTopic
        method: DELETE
        description: Novu Delete a Topic
        inputParameters:
        - name: topicKey
          in: path
          type: string
          required: true
          description: The key identifier of the topic
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-topics-topickey-subscriptions
      path: /v2/topics/{topicKey}/subscriptions
      operations:
      - name: TopicsController_listTopicSubscriptions
        method: GET
        description: Novu List Topic Subscriptions
        inputParameters:
        - name: topicKey
          in: path
          type: string
          required: true
          description: The key identifier of the topic
        - name: after
          in: query
          type: string
          required: false
          description: Cursor for pagination indicating the starting point after which to fetch results.
        - name: before
          in: query
          type: string
          required: false
          description: Cursor for pagination indicating the ending point before which to fetch results.
        - name: limit
          in: query
          type: number
          required: false
          description: Limit the number of items to return (max 100)
        - name: orderDirection
          in: query
          type: string
          required: false
          description: Direction of sorting
        - name: orderBy
          in: query
          type: string
          required: false
          description: Field to order by
        - name: includeCursor
          in: query
          type: boolean
          required: false
          description: Include cursor item in response
        - name: subscriberId
          in: query
          type: string
          required: false
          description: Filter by subscriber ID
        - name: contextKeys
          in: query
          type: array
          required: false
          description: 'Filter by exact context keys, order insensitive (format: "type:id")'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: TopicsController_createTopicSubscriptions
        method: POST
        description: Novu Create Topic Subscriptions
        inputParameters:
        - name: topicKey
          in: path
          type: string
          required: true
          description: The key identifier of the topic
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: TopicsController_deleteTopicSubscriptions
        method: DELETE
        description: Novu Delete Topic Subscriptions
        inputParameters:
        - name: topicKey
          in: path
          type: string
          required: true
          description: The key identifier of the topic
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-topics-topickey-subscriptions-identifier
      path: /v2/topics/{topicKey}/subscriptions/{identifier}
      operations:
      - name: TopicsController_getTopicSubscription
        method: GET
        description: Novu Retrieve a Topic Subscription
        inputParameters:
        - name: topicKey
          in: path
          type: string
          required: true
          description: The key identifier of the topic
        - name: identifier
          in: path
          type: string
          required: true
          description: The unique identifier of the subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: TopicsController_updateTopicSubscription
        method: PATCH
        description: Novu Update a Topic Subscription
        inputParameters:
        - name: topicKey
          in: path
          type: string
          required: true
          description: The key identifier of the topic
        - name: identifier
          in: path
          type: string
          required: true
          description: The unique identifier of the subscription
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
