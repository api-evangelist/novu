      operations:
      - method: POST
        name: TranslationController_uploadMasterJsonEndpoint
        description: Novu Upload Master Translations JSON File
        call: novu-translations.TranslationController_uploadMasterJsonEndpoint
        with:
          body: rest.body
        outputParameters:
        - type: object
