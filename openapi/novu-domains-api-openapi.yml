components:
  schemas:
    TestDomainRouteAgentResultDto:
      type: object
      properties:
        agentId:
          type: string
        httpStatus:
          type: number
        agentReply:
          type: object
          description: Parsed JSON body from the agent webhook response when JSON.
        latencyMs:
          type: number
      required:
      - agentId
      - httpStatus
      - latencyMs
    CreateDomainConnectApplyUrlDto:
      type: object
      properties:
        redirectUri:
          type: string
          description: Dashboard URL to return to after the DNS provider consent flow completes.
    ListDomainsResponseDto:
      type: object
      properties:
        data:
          description: List of returned domains
          type: array
          items:
            $ref: '#/components/schemas/DomainResponseDto'
        next:
          type:
          - string
          - 'null'
          description: The cursor for the next page of results, or null if there are no more pages.
        previous:
          type:
          - string
          - 'null'
          description: The cursor for the previous page of results, or null if this is the first page.
        totalCount:
          type: number
          description: The total count of items (up to 50,000)
        totalCountCapped:
          type: boolean
          description: Whether there are more than 50,000 results available
      required:
      - data
      - next
      - previous
      - totalCount
      - totalCountCapped
    DomainConnectApplyUrlResponseDto:
      type: object
      properties:
        applyUrl:
          type: string
        providerName:
          type: string
        redirectUri:
          type: string
      required:
      - applyUrl
      - providerName
      - redirectUri
    DiagnoseDomainResponseDto:
      type: object
      properties:
        ok:
          type: boolean
          description: True when there are no error-severity issues
        runAt:
          type: string
          description: ISO timestamp when the diagnostic run finished
        checks:
          type: array
          items:
            $ref: '#/components/schemas/DomainDiagnosticCheckDto'
        issues:
          type: array
          items:
            $ref: '#/components/schemas/DomainDiagnosticIssueDto'
      required:
      - ok
      - runAt
      - checks
      - issues
    ConstraintValidation:
      type: object
      properties:
        messages:
          type: array
          items:
            type: string
          description: List of validation error messages
          example:
          - Field is required
          - Invalid format
        value:
          description: Value that failed validation
          oneOf:
          - type:
            - string
            - 'null'
          - type: number
          - type: boolean
          - type: object
          - type: array
            items:
              anyOf:
              - type:
                - string
                - 'null'
              - type: number
              - type: boolean
              - type: object
                additionalProperties: true
          example: 'xx xx xx '
      required:
      - messages
    TestDomainRouteResponseDto:
      type: object
      properties:
        matched:
          type: boolean
        dryRun:
          type: boolean
        domainStatus:
          enum:
          - pending
          - verified
          type: string
        mxRecordConfigured:
          type: boolean
        type:
          enum:
          - agent
          - webhook
          type: string
        wouldDeliverTo:
          type: string
          description: Human-readable delivery target summary in dry-run mode.
        payload:
          type: object
          description: The outbound payload (dry-run only).
          additionalProperties: true
        webhook:
          $ref: '#/components/schemas/TestDomainRouteWebhookResultDto'
        agent:
          $ref: '#/components/schemas/TestDomainRouteAgentResultDto'
      required:
      - matched
      - dryRun
    ListDomainRoutesResponseDto:
      type: object
      properties:
        data:
          description: List of returned domain routes
          type: array
          items:
            $ref: '#/components/schemas/DomainRouteResponseDto'
        next:
          type:
          - string
          - 'null'
          description: The cursor for the next page of results, or null if there are no more pages.
        previous:
          type:
          - string
          - 'null'
          description: The cursor for the previous page of results, or null if this is the first page.
        totalCount:
          type: number
          description: The total count of items (up to 50,000)
        totalCountCapped:
          type: boolean
          description: Whether there are more than 50,000 results available
      required:
      - data
      - next
      - previous
      - totalCount
      - totalCountCapped
    UpdateDomainDto:
      type: object
      properties:
        data:
          type: object
          description: Replaces domain metadata when provided (max 10 keys, 500 characters total for keys+values).
          additionalProperties:
            type: string
    ValidationErrorDto:
      type: object
      properties:
        statusCode:
          type: number
          description: HTTP status code of the error response.
          example: 404
        timestamp:
          type: string
          description: Timestamp of when the error occurred.
          example: '2024-12-12T13:00:00Z'
        path:
          type: string
          description: The path where the error occurred.
          example: /api/v1/resource
        message:
          description: Value that failed validation
          oneOf:
          - type:
            - string
            - 'null'
          - type: number
          - type: boolean
          - type:
            - object
            - 'null'
          - type: array
            items:
              anyOf:
              - type:
                - string
                - 'null'
              - type: number
              - type: boolean
              - type: object
                additionalProperties: true
          example: 'xx xx xx '
        ctx:
          type: object
          description: Optional context object for additional error details.
          additionalProperties: true
          example:
            workflowId: some_wf_id
            stepId: some_wf_id
        errorId:
          type: string
          description: "Optional unique identifier for the error, useful for tracking using Sentry and \n      New Relic, only available for 500."
          example: abc123
        errors:
          type: object
          description: A record of validation errors keyed by field name
          additionalProperties:
            $ref: '#/components/schemas/ConstraintValidation'
          example:
            fieldName1:
              messages:
              - Field is required
              - Must be a valid email address
              value: invalidEmail
            fieldName2:
              messages:
              - Must be at least 18 years old
              value: 17
            fieldName3:
              messages:
              - Must be a boolean value
              value: true
            fieldName4:
              messages:
              - Must be a valid object
              value:
                key: value
            fieldName5:
              messages:
              - Field is missing
              value: null
            fieldName6:
              messages:
              - Undefined value
      required:
      - statusCode
      - timestamp
      - path
      - errors
    ErrorDto:
      type: object
      properties:
        statusCode:
          type: number
          description: HTTP status code of the error response.
          example: 404
        timestamp:
          type: string
          description: Timestamp of when the error occurred.
          example: '2024-12-12T13:00:00Z'
        path:
          type: string
          description: The path where the error occurred.
          example: /api/v1/resource
        message:
          description: Value that failed validation
          oneOf:
          - type:
            - string
            - 'null'
          - type: number
          - type: boolean
          - type:
            - object
            - 'null'
          - type: array
            items:
              anyOf:
              - type:
                - string
                - 'null'
              - type: number
              - type: boolean
              - type: object
                additionalProperties: true
          example: 'xx xx xx '
        ctx:
          type: object
          description: Optional context object for additional error details.
          additionalProperties: true
          example:
            workflowId: some_wf_id
            stepId: some_wf_id
        errorId:
          type: string
          description: "Optional unique identifier for the error, useful for tracking using Sentry and \n      New Relic, only available for 500."
          example: abc123
      required:
      - statusCode
      - timestamp
      - path
    TestDomainRouteDto:
      type: object
      properties:
        from:
          $ref: '#/components/schemas/TestDomainRouteFromDto'
        subject:
          type: string
        text:
          type: string
        html:
          type: string
        dryRun:
          type: boolean
          description: When true, returns the payload that would be delivered without invoking outbound webhooks or the agent HTTP endpoint.
      required:
      - from
      - subject
    DomainRouteDto:
      type: object
      properties:
        address:
          type: string
          description: Inbox address local part (e.g. "support", "*")
        agentId:
          type: string
          description: Agent identifier; required when type is agent, unused for webhook
        type:
          enum:
          - agent
          - webhook
          type: string
        data:
          type: object
          description: Optional string key-value metadata (max 10 keys, 500 characters total for keys+values).
          additionalProperties:
            type: string
      required:
      - address
      - type
    DomainDiagnosticCheckDto:
      type: object
      properties:
        code:
          enum:
          - mx_missing
          - mx_wrong_target
          - mx_low_priority
          - apex_cname_collision
          - dnsbl_listed
          type: string
        status:
          enum:
          - pass
          - fail
          - skipped
          type: string
        latencyMs:
          type: number
          description: Round-trip time for this check in milliseconds
      required:
      - code
      - status
      - latencyMs
    TestDomainRouteWebhookResultDto:
      type: object
      properties:
        skipped:
          type: boolean
          description: True when outbound webhooks are disabled for this environment (nothing was emitted).
        latencyMs:
          type: number
      required:
      - latencyMs
    DomainRouteResponseDto:
      type: object
      properties:
        _id:
          type: string
        _domainId:
          type: string
        address:
          type: string
        agentId:
          type: string
          description: Internal id of the destination agent. Only present for agent routes.
        type:
          enum:
          - agent
          - webhook
          type: string
        _environmentId:
          type: string
        _organizationId:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        data:
          type: object
          description: String key-value metadata (max 10 keys, 500 characters total when set via API).
          additionalProperties:
            type: string
      required:
      - _id
      - _domainId
      - address
      - type
      - _environmentId
      - _organizationId
      - createdAt
      - updatedAt
    TestDomainRouteFromDto:
      type: object
      properties:
        address:
          type: string
        name:
          type: string
      required:
      - address
    DomainDiagnosticIssueDto:
      type: object
      properties:
        code:
          enum:
          - mx_missing
          - mx_wrong_target
          - mx_low_priority
          - apex_cname_collision
          - dnsbl_listed
          type: string
        severity:
          enum:
          - warn
          - error
          type: string
        message:
          type: string
        fix:
          type: string
          description: Plain-language remediation guidance
      required:
      - code
      - severity
      - message
      - fix
    CreateDomainDto:
      type: object
      properties:
        name:
          type: string
          description: The domain name (e.g. "recent.dev")
        data:
          type: object
          description: Optional string key-value metadata (max 10 keys, 500 characters total for keys+values).
          additionalProperties:
            type: string
      required:
      - name
    UpdateDomainRouteDto:
      type: object
      properties:
        agentId:
          type: string
          description: Agent identifier; required when type is agent, ignored when type is webhook.
        type:
          enum:
          - agent
          - webhook
          type: string
        data:
          type: object
          description: Replaces route metadata when provided (max 10 keys, 500 characters total for keys+values).
          additionalProperties:
            type: string
    DomainConnectStatusResponseDto:
      type: object
      properties:
        available:
          type: boolean
        providerName:
          type: string
        providerId:
          type: string
        reason:
          type: string
        reasonCode:
          enum:
          - disabled
          - discovery_not_configured
          - unsupported_provider
          - incomplete_configuration
          - provider_settings_unavailable
          - untrusted_provider_flow
          - template_not_onboarded
          type: string
        manualRecords:
          type: array
          items:
            $ref: '#/components/schemas/ExpectedDnsRecordDto'
      required:
      - available
      - manualRecords
    ExpectedDnsRecordDto:
      type: object
      properties:
        type:
          type: string
          example: MX
        name:
          type: string
          example: inbound
        content:
          type: string
          example: inbound-smtp.us-east-1.amazonaws.com
        ttl:
          type: string
          example: Auto
        priority:
          type: number
          example: 10
      required:
      - type
      - name
      - content
      - ttl
    DomainResponseDto:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        status:
          enum:
          - pending
          - verified
          type: string
        mxRecordConfigured:
          type: boolean
        dnsProvider:
          type: string
        _environmentId:
          type: string
        _organizationId:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        expectedDnsRecords:
          type: array
          items:
            $ref: '#/components/schemas/ExpectedDnsRecordDto'
        data:
          type: object
          description: String key-value metadata (max 10 keys, 500 characters total when set via API).
          additionalProperties:
            type: string
      required:
      - _id
      - name
      - status
      - mxRecordConfigured
      - _environmentId
      - _organizationId
      - createdAt
      - updatedAt
  headers:
    RateLimit-Remaining:
      required: false
      description: The number of requests remaining until the next window.
      schema:
        type: string
      example: '93'
    Idempotency-Key:
      required: false
      description: The idempotency key used to evaluate the request.
      schema:
        type: string
      example: '8'
    Idempotency-Replay:
      required: false
      description: Whether the request was a replay of a previous request.
      schema:
        type: string
      example: 'true'
    Retry-After:
      required: false
      description: The number of seconds after which the client may retry the request that was previously rejected.
      schema:
        type: string
      example: '8'
    RateLimit-Limit:
      required: false
      description: The number of requests that the client is permitted to make per second. The actual maximum may differ when burst is enabled.
      schema:
        type: string
      example: '100'
    RateLimit-Reset:
      required: false
      description: The remaining seconds until a request of the same cost will be refreshed.
      schema:
        type: string
      example: '8'
    RateLimit-Policy:
      required: false
      description: The rate limit policy that was used to evaluate the request.
      schema:
        type: string
      example: 100;w=1;burst=110;comment="token bucket";category="trigger";cost="single"
    Content-Type:
      required: true
      description: The MIME type of the response body.
      schema:
        type: string
      example: application/json
  securitySchemes:
    secretKey:
      type: apiKey
      name: Authorization
      in: header
      description: 'API key authentication. Allowed headers-- "Authorization: ApiKey <novu_secret_key>".'
      x-speakeasy-example: YOUR_SECRET_KEY_HERE
externalDocs:
  description: Novu Documentation
  url: https://docs.novu.co
x-webhooks:
  message.sent:
    post:
      summary: 'Event: message.sent'
      description: This webhook is triggered when a `message` event (`message.sent`) occurs. The payload contains the details of the event. Configure your webhook endpoint URL in the Novu dashboard.
      requestBody:
        description: Webhook payload for the `message.sent` event.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookMessageDtoWebhookPayloadWrapper'
