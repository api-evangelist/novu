components:
  schemas:
    SyncActionEnum:
      type: string
      description: Sync action performed
      enum:
      - created
      - updated
      - skipped
      - deleted
    ResourceToPublishDto:
      type: object
      properties:
        resourceType:
          $ref: '#/components/schemas/ResourceTypeEnum'
        resourceId:
          type: string
          description: Unique identifier of the resource to publish
          example: workflow-id-1
      required:
      - resourceType
      - resourceId
    ResourceTypeEnum:
      type: string
      description: Type of the layout
      enum:
      - REGULAR
      - ECHO
      - BRIDGE
    ApiKeyDto:
      type: object
      properties:
        key:
          type: string
          description: API key
          example: sk_test_1234567890abcdef
        _userId:
          type: string
          description: User ID associated with the API key
          example: 60d5ecb8b3b3a30015f3e1a4
        hash:
          type: string
          description: Hashed representation of the API key
          example: hash_value_here
      required:
      - key
      - _userId
    DiffEnvironmentRequestDto:
      type: object
      properties:
        sourceEnvironmentId:
          type: string
