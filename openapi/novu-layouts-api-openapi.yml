          - $ref: '#/components/schemas/LayoutPreviewPayloadDto'
        schema:
          type:
          - object
          - 'null'
          description: The payload schema that was used to generate the preview payload example
          additionalProperties: true
        result:
          description: Preview result
          oneOf:
          - properties:
              type:
                enum:
                - email
