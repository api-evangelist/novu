components:
  schemas:
    UiSchema:
      type: object
      properties:
        group:
          $ref: '#/components/schemas/UiSchemaGroupEnum'
        properties:
          type: object
          description: Properties of the UI Schema
          additionalProperties:
            $ref: '#/components/schemas/UiSchemaProperty'
    ResourceTypeEnum:
      type: string
      description: Type of the layout
      enum:
      - REGULAR
      - ECHO
      - BRIDGE
    ChannelSettingsDto:
      type: object
      properties:
        providerId:
          $ref: '#/components/schemas/ChatOrPushProviderEnum'
        integrationIdentifier:
          type: string
          description: The integration identifier
        credentials:
          description: Credentials payload for the specified provider
          allOf:
          - $ref: '#/components/schemas/ChannelCredentials'
        _integrationId:
          type: string
          description: The unique identifier of the integration associated with this channel.
      required:
      - providerId
      - credentials
      - _integrationId
    UpdateLayoutDto:
      type: object
      properties:
        name:
          type: string
          description: Name of the layout
        isTranslationEnabled:
          type: boolean
          description: Enable or disable translations for this layout
          default: false
        controlValues:
          description: Control values for the layout. Omit to leave unchanged, or set to null to clear stored control values.
          allOf:
          - $ref: '#/components/schemas/LayoutControlValuesDto'
      required:
      - name
    LayoutResponseDto:
      type: object
      properties:
        _id:
          type: string
          description: Unique internal identifier of the layout
        layoutId:
          type: string
          description: Unique identifier for the layout
        slug:
          type: string
          description: Slug of the layout
        name:
          type: string
          description: Name of the layout
        isDefault:
          type: boolean
          description: Whether the layout is the default layout
        isTranslationEnabled:
          type: boolean
          description: Whether the layout translations are enabled
        updatedAt:
          type: string
          description: Last updated timestamp
        updatedBy:
          description: User who last updated the layout
          allOf:
          - $ref: '#/components/schemas/UserResponseDto'
        createdAt:
          type: string
          description: Creation timestamp
        origin:
          $ref: '#/components/schemas/ResourceOriginEnum'
        type:
          $ref: '#/components/schemas/ResourceTypeEnum'
        variables:
          type:
          - object
          - 'null'
          description: The variables JSON Schema for the layout
          additionalProperties: true
        controls:
          description: Controls metadata for the layout
          allOf:
          - $ref: '#/components/schemas/LayoutControlsDto'
      required:
      - _id
      - layoutId
      - slug
      - name
      - isDefault
      - isTranslationEnabled
      - updatedAt
      - createdAt
      - origin
      - type
      - controls
    DuplicateLayoutDto:
      type: object
      properties:
        name:
          type: string
          description: Name of the layout
        layoutId:
          type: string
          description: Identifier for the duplicated layout. When omitted, it is derived from the name.
        isTranslationEnabled:
          type: boolean
          description: Enable or disable translations for this layout
          default: false
      required:
      - name
    LayoutPreviewPayloadDto:
      type: object
      properties:
        subscriber:
          description: Partial subscriber information
          allOf:
          - $ref: '#/components/schemas/SubscriberResponseDtoOptional'
    ConstraintValidation:
      type: object
      properties:
        messages:
          type: array
          items:
            type: string
          description: List of validation error messages
          example:
          - Field is required
          - Invalid format
        value:
          description: Value that failed validation
          oneOf:
          - type:
            - string
            - 'null'
          - type: number
          - type: boolean
          - type: object
          - type: array
            items:
              anyOf:
              - type:
                - string
                - 'null'
              - type: number
              - type: boolean
              - type: object
                additionalProperties: true
          example: 'xx xx xx '
      required:
      - messages
    UserResponseDto:
      type: object
      properties:
        _id:
          type: string
          description: User ID
        firstName:
          type:
          - string
          - 'null'
          description: User first name
        lastName:
          type:
          - string
          - 'null'
          description: User last name
        externalId:
          type:
          - string
          - 'null'
          description: User external ID
      required:
      - _id
    EmailControlsDto:
      type: object
      properties:
        body:
          type: string
          description: Body of the layout.
        editorType:
          type: string
          description: Editor type of the layout.
          enum:
          - html
          - block
      required:
      - body
      - editorType
    UiSchemaGroupEnum:
      type: string
      description: Group of the UI Schema
      enum:
      - IN_APP
      - EMAIL
      - DIGEST
      - DELAY
      - THROTTLE
      - SMS
      - CHAT
      - PUSH
      - SKIP
      - LAYOUT
      - HTTP_REQUEST
    ResourceOriginEnum:
      type: string
      description: Origin of the layout
      enum:
      - novu-cloud
      - novu-cloud-v1
      - external
    EmailLayoutRenderOutput:
      type: object
      properties:
        body:
          type: string
          description: Content of the email
      required:
      - body
    ListLayoutResponseDto:
      type: object
      properties:
        layouts:
          description: List of layouts
          type: array
          items:
            $ref: '#/components/schemas/LayoutResponseDto'
        totalCount:
          type: number
          description: Total number of layouts
      required:
      - layouts
      - totalCount
    ErrorDto:
      type: object
      properties:
        statusCode:
          type: number
          description: HTTP status code of the error response.
          example: 404
        timestamp:
          type: string
          description: Timestamp of when the error occurred.
          example: '2024-12-12T13:00:00Z'
        path:
          type: string
          description: The path where the error occurred.
          example: /api/v1/resource
        message:
          description: Value that failed validation
          oneOf:
          - type:
            - string
            - 'null'
          - type: number
          - type: boolean
          - type:
            - object
            - 'null'
          - type: array
            items:
              anyOf:
              - type:
                - string
                - 'null'
              - type: number
              - type: boolean
              - type: object
                additionalProperties: true
          example: 'xx xx xx '
        ctx:
          type: object
          description: Optional context object for additional error details.
          additionalProperties: true
          example:
            workflowId: some_wf_id
            stepId: some_wf_id
        errorId:
          type: string
          description: "Optional unique identifier for the error, useful for tracking using Sentry and \n      New Relic, only available for 500."
          example: abc123
      required:
      - statusCode
      - timestamp
      - path
    ValidationErrorDto:
      type: object
      properties:
        statusCode:
          type: number
          description: HTTP status code of the error response.
          example: 404
        timestamp:
          type: string
          description: Timestamp of when the error occurred.
          example: '2024-12-12T13:00:00Z'
        path:
          type: string
          description: The path where the error occurred.
          example: /api/v1/resource
        message:
          description: Value that failed validation
          oneOf:
          - type:
            - string
            - 'null'
          - type: number
          - type: boolean
          - type:
            - object
            - 'null'
          - type: array
            items:
              anyOf:
              - type:
                - string
                - 'null'
              - type: number
              - type: boolean
              - type: object
                additionalProperties: true
          example: 'xx xx xx '
        ctx:
          type: object
          description: Optional context object for additional error details.
          additionalProperties: true
          example:
            workflowId: some_wf_id
            stepId: some_wf_id
        errorId:
          type: string
          description: "Optional unique identifier for the error, useful for tracking using Sentry and \n      New Relic, only available for 500."
          example: abc123
        errors:
          type: object
          description: A record of validation errors keyed by field name
          additionalProperties:
            $ref: '#/components/schemas/ConstraintValidation'
          example:
            fieldName1:
              messages:
              - Field is required
              - Must be a valid email address
              value: invalidEmail
            fieldName2:
              messages:
              - Must be at least 18 years old
              value: 17
            fieldName3:
              messages:
              - Must be a boolean value
              value: true
            fieldName4:
              messages:
              - Must be a valid object
              value:
                key: value
            fieldName5:
              messages:
              - Field is missing
              value: null
            fieldName6:
              messages:
              - Undefined value
      required:
      - statusCode
      - timestamp
      - path
      - errors
    LayoutResponseDtoSortField:
      type: string
      enum:
      - createdAt
      - updatedAt
      - name
    GetLayoutUsageResponseDto:
      type: object
      properties:
        workflows:
          description: Array of workflows that use this layout
          type: array
          items:
            $ref: '#/components/schemas/WorkflowInfoDto'
      required:
      - workflows
    UiSchemaProperty:
      type: object
      properties:
        placeholder:
          description: Placeholder for the UI Schema Property
          anyOf:
          - type: string
          - type: number
          - type: boolean
          - type: object
            additionalProperties: true
          - type: array
            items:
              anyOf:
              - type: string
              - type: number
              - type: boolean
              - type: object
                additionalProperties: true
        component:
          $ref: '#/components/schemas/UiComponentEnum'
        properties:
          type: object
          description: Properties of the UI Schema
          additionalProperties:
            $ref: '#/components/schemas/UiSchemaProperty'
      required:
      - component
    DirectionEnum:
      type: string
      enum:
      - ASC
      - DESC
    LayoutCreationSourceEnum:
      type: string
      description: Source of layout creation
      default: dashboard
      enum:
      - dashboard
    WorkflowInfoDto:
      type: object
      properties:
        name:
          type: string
          description: The name of the workflow
          example: Welcome Email
        workflowId:
          type: string
          description: The unique identifier of the workflow
          example: welcome-email
      required:
      - name
      - workflowId
    LayoutControlsDto:
      type: object
      properties:
        dataSchema:
          type: object
          description: JSON Schema for data
          additionalProperties: true
        uiSchema:
          description: UI Schema for rendering
          allOf:
          - $ref: '#/components/schemas/UiSchema'
        values:
          description: Email layout controls
          allOf:
          - $ref: '#/components/schemas/LayoutControlValuesDto'
      required:
      - values
    LayoutPreviewRequestDto:
      type: object
      properties:
        controlValues:
          type: object
          description: Optional control values for layout preview
          additionalProperties: true
        previewPayload:
          description: Optional payload for layout preview
          allOf:
          - $ref: '#/components/schemas/LayoutPreviewPayloadDto'
    GenerateLayoutPreviewResponseDto:
      type: object
      properties:
        previewPayloadExample:
          description: Preview payload example
