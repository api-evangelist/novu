      - DIGEST_UNIT
      - DIGEST_TYPE
      - DIGEST_KEY
      - DIGEST_CRON
      - DELAY_AMOUNT
      - DELAY_UNIT
      - DELAY_TYPE
      - DELAY_CRON
      - DELAY_DYNAMIC_KEY
      - THROTTLE_TYPE
      - THROTTLE_WINDOW
      - THROTTLE_UNIT
      - THROTTLE_DYNAMIC_KEY
      - THROTTLE_THRESHOLD
      - THROTTLE_KEY
      - EXTEND_TO_SCHEDULE
      - SMS_BODY
      - CHAT_BODY
      - PUSH_BODY
      - PUSH_SUBJECT
      - QUERY_EDITOR
      - DATA
