        required: false
        in: query
        description: Number of items to return per page
        example: 10
        schema:
          type: number
      - name: offset
        required: false
        in: query
        description: Number of items to skip before starting to return results
        example: 0
        schema:
          type: number
      - name: orderDirection
        required: false
        in: query
        description: Direction of sorting
